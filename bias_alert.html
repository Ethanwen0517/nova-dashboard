<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BIAS 乖離率警示板</title>
<style>
.nova-timestamp{position:fixed;top:12px;right:16px;background:#1a73e8;color:white;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;z-index:9999;box-shadow:0 2px 8px rgba(0,0,0,.2);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;}

















































*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Noto Sans CJK TC",Arial,sans-serif;background:#1a1a2e;color:#fff;
  min-height:100vh;padding:20px}
h1{font-size:22px;font-weight:bold;color:#e0aaff;margin-bottom:8px;text-align:center}
.sub{font-size:13px;color:#9d4edd;margin-bottom:16px;text-align:center}
.controls{display:flex;gap:12px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
select,button{background:#2a2a5a;color:#fff;border:1px solid #9d4edd;
  border-radius:8px;padding:8px 16px;font-size:14px;cursor:pointer;font-family:inherit}
select:focus,button:focus{border-color:#c77dff;outline:none}
button{background:#4a0080}
button:hover{background:#7b2cbf}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.card{background:#1e1e3f;border-radius:12px;padding:16px 18px;
  border-left:5px solid #9d4edd;transition:transform 0.15s}
.card:hover{transform:translateY(-2px)}
.card.red{border-left-color:#ff4444;background:#1e1e2e}
.card.green{border-left-color:#44ff88;background:#1e1e2e}
.card.yellow{border-left-color:#ffdd44;background:#1e1e2e}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.card-name{font-size:16px;font-weight:bold;color:#e0aaff}
.card-code{font-size:12px;color:#888}
.card-tag{font-size:11px;padding:3px 8px;border-radius:10px;font-weight:bold}
.tag-red{background:#ff444422;color:#ff6666}
.tag-green{background:#44ff8822;color:#66ffaa}
.tag-yellow{background:#ffdd4422;color:#ffdd66}
.tag-neutral{background:#9d4edd22;color:#c77dff}
.metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px}
.metric{text-align:center;padding:8px;background:#2a2a5a;border-radius:8px}
.metric-val{font-size:18px;font-weight:bold}
.metric-lbl{font-size:11px;color:#888;margin-top:2px}
.price{font-size:14px;color:#ccc;margin-bottom:8px}
.reason{font-size:12px;color:#aaa;line-height:1.5;background:#2a2a5a;
  padding:8px 10px;border-radius:6px}
.alert-title{font-size:13px;font-weight:bold;margin-bottom:6px;color:#ccc}
.alert-list{font-size:12px;color:#aaa;line-height:1.7}
.alert-item{padding:4px 0;border-bottom:1px solid #333}
.alert-item:last-child{border-bottom:none}
.empty{color:#666;font-size:14px;text-align:center;padding:40px}
.footer{text-align:center;font-size:12px;color:#555;margin-top:30px}
</style>
</head>
<body>
<div class="nova-timestamp">📅 Updated: Apr 24, 2026 04:20 PM</div>

<h1>📊 BIAS 乖離率警示板</h1>
<div class="sub" id="subText">—</div>
<div class="controls">
  <select id="filterSelect" onchange="render()">
    <option value="all">全部股票</option>
    <option value="overheat">🔥 過熱（BIAS5 > 8%）</option>
    <option value="oversold">❄️ 超跌（BIAS5 < -8%）</option>
    <option value="warm">⚠️ 偏熱（5%~8%）</option>
    <option value="cold">💧 偏冷（-8%~-5%）</option>
        <option value="bias20_high">📈 強多（BIAS20 > 15%）</option>
  </select>
</div>
<div class="grid" id="grid"></div>
<div class="footer">數據來源：Yahoo Finance | MA5/10/20 自計算 | 僅供參考，不構成投資建議</div>

<script>
// ====== 從技術分析總表 HTML 讀取 BIAS 資料 ======
// 格式：{代碼: {name, price, bias5 bias20, score, is_holding}}

var STOCKS_DATA = {"2409": {"name": "友達", "price": 17.3, "chg_pct": 2.54, "bias5": -5.64, "bias20": -4.62, "score": 28, "is_holding": true}, "1301": {"name": "台塑", "price": 50.1, "chg_pct": -1.76, "bias5": -2.72, "bias20": -7.53, "score": 50, "is_holding": true}, "2609": {"name": "陽明", "price": 50.1, "chg_pct": 0.0, "bias5": -0.4, "bias20": -8.87, "score": 28, "is_holding": true}, "6153": {"name": "嘉聯益", "price": 18.65, "chg_pct": 0.54, "bias5": -3.12, "bias20": -8.77, "score": 100, "is_holding": true}, "2349": {"name": "錸德", "price": 12.8, "chg_pct": 2.29, "bias5": -4.05, "bias20": -10.15, "score": 53, "is_holding": true}, "2881": {"name": "富邦金", "price": 87.8, "chg_pct": 0.0, "bias5": -0.07, "bias20": 0.0, "score": 38, "is_holding": false}, "2887": {"name": "台新新光金", "price": 23.95, "chg_pct": 0.0, "bias5": 0.0, "bias20": 0.0, "score": 83, "is_holding": false}, "3062": {"name": "建漢", "price": 25.8, "chg_pct": 0.0, "bias5": -11.0, "bias20": 0.0, "score": 90, "is_holding": false}, "3481": {"name": "群創", "price": 23.4, "chg_pct": 2.9, "bias5": -6.59, "bias20": -7.25, "score": 83, "is_holding": false}, "3545": {"name": "敦泰", "price": 53.0, "chg_pct": 0.0, "bias5": 0.92, "bias20": 0.0, "score": 70, "is_holding": false}, "3645": {"name": "達邁", "price": 106.0, "chg_pct": 0.0, "bias5": -3.64, "bias20": 12.0, "score": 82, "is_holding": false}, "5315": {"name": "光聯", "price": 22.55, "chg_pct": 0.0, "bias5": -1.96, "bias20": -5.75, "score": 60, "is_holding": false}, "6239": {"name": "力成", "price": 210.0, "chg_pct": 0.0, "bias5": -0.62, "bias20": 0.0, "score": 70, "is_holding": false}, "6770": {"name": "力積電", "price": 52.9, "chg_pct": 0.38, "bias5": -1.38, "bias20": -3.5, "score": 17, "is_holding": false}, "7866": {"name": "丹立", "price": 196.0, "chg_pct": 0.0, "bias5": -3.31, "bias20": 0.0, "score": 90, "is_holding": false}};

var BIAS_THRESHOLDS = {
  OVERHEAT: 8,      // BIAS5 > 8%
  WARM: 5,          // BIAS5 5~8%
  COLD: -5,          // BIAS5 -5%~-8%
  OVERSOLD: -8,     // BIAS5 < -8%
   BIAS20_HIGH: 15    // BIAS20 > 15%
};

function getTag(bias5, bias20) {
  if (bias5 > BIAS_THRESHOLDS.OVERHEAT) return {cls: 'red', label: '🔥 過熱', tagCls: 'tag-red'};
  if (bias5 > BIAS_THRESHOLDS.WARM) return {cls: 'yellow', label: '⚠️ 偏熱', tagCls: 'tag-yellow'};
  if (bias5 < BIAS_THRESHOLDS.OVERSOLD) return {cls: 'green', label: '❄️ 超跌', tagCls: 'tag-green'};
  if (bias5 < BIAS_THRESHOLDS.COLD) return {cls: 'green', label: '💧 偏冷', tagCls: 'tag-green'};
  return {cls: '', label: '➡️ 中性', tagCls: 'tag-neutral'};
}

function getReason(code, bias5, bias20, price) {
  var reasons = [];
  if (bias5 > BIAS_THRESHOLDS.OVERHEAT)
    reasons.push('BIAS5=' + bias5 + '% 偏高，股價偏離短期均線過遠');
  if (bias5 > BIAS_THRESHOLDS.WARM)
    reasons.push('BIAS5=' + bias5 + '% 偏熱');
  if (bias5 < BIAS_THRESHOLDS.OVERSOLD)
    reasons.push('BIAS5=' + bias5 + '% 偏低，隨時可能反彈');
  if (bias5 < BIAS_THRESHOLDS.COLD)
    reasons.push('BIAS5=' + bias5 + '% 偏冷');

  if (bias20 > BIAS_THRESHOLDS.BIAS20_HIGH)
    reasons.push('BIAS20=' + bias20 + '% 處中期強勢格局');
  return reasons.length > 0 ? reasons.join('；') : '乖離率在正常範圍內';
}

function biasColor(val) {
  if (val > 8) return '#ff6666';
  if (val > 5) return '#ffaa44';
  if (val < -8) return '#44ff88';
  if (val < -5) return '#88ffaa';
  return '#e0aaff';
}

function fmt(v) {
  if (v === null || v === undefined || v === '—') return '—';
  return parseFloat(v).toFixed(2);
}

function render() {
  var filter = document.getElementById('filterSelect').value;
  var grid = document.getElementById('grid');
  var all = Object.entries(STOCKS_DATA);
  var filtered = all.filter(function(entry) {
    var code = entry[0];
    var d = entry[1];
    var b5 = parseFloat(d.bias5);
      var b20 = parseFloat(d.bias20);
    switch(filter) {
      case 'overheat': return b5 > BIAS_THRESHOLDS.OVERHEAT;
      case 'oversold': return b5 < BIAS_THRESHOLDS.OVERSOLD;
      case 'warm': return b5 > BIAS_THRESHOLDS.WARM && b5 <= BIAS_THRESHOLDS.OVERHEAT;
      case 'cold': return b5 < BIAS_THRESHOLDS.COLD && b5 >= BIAS_THRESHOLDS.OVERSOLD;
      case 'bias20_high': return b20 > BIAS_THRESHOLDS.BIAS20_HIGH;
      default: return true;
    }
  });

  // Sort by absolute bias value (most extreme first)
  filtered.sort(function(a, b) {
    return Math.abs(parseFloat(b[1].bias5)) - Math.abs(parseFloat(a[1].bias5));
  });

  document.getElementById('subText').textContent =
    '共 ' + all.length + ' 檔 | 顯示 ' + filtered.length + ' 檔 | ' +
    '過熱阈值 BIAS5>8% 超跌<−8%';

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty">目前沒有符合條件的股票</div>';
    return;
  }

  grid.innerHTML = filtered.map(function(entry) {
    var code = entry[0];
    var d = entry[1];
    var b5 = parseFloat(d.bias5);
      var b20 = parseFloat(d.bias20);
    var tag = getTag(b5, b20);
    var hold = d.is_holding ? '🏠 ' : '';
    var reason = getReason(code, b5, b20, d.price);

    return '<div class="card ' + tag.cls + '">' +
      '<div class="card-header">' +
        '<div><span class="card-name">' + hold + d.name + '</span><span class="card-code"> (' + code + ')</span></div>' +
        '<span class="card-tag ' + tag.tagCls + '">' + tag.label + '</span>' +
      '</div>' +
      '<div class="price">收盤價 $' + d.price + '（$' + d.chg_pct + '%）</div>' +
      '<div class="metrics">' +
        '<div class="metric">' +
          '<div class="metric-val" style="color:' + biasColor(b5) + '">' + fmt(b5) + '%</div>' +
          '<div class="metric-lbl">BIAS5</div>' +
        '</div>' +
        '<div class="metric">' +
          '<div class="metric-val" style="color:' + biasColor(b20) + '">' + fmt(b20) + '%</div>' +
          '<div class="metric-lbl">BIAS20</div>' +
        '</div>' +
      '</div>' +
      '<div class="reason">📝 ' + reason + '</div>' +
    '</div>';
  }).join('');
}

document.addEventListener('DOMContentLoaded', render);
</script>
</body>
</html>
