var TOTAL = 64;
var DATE_DISPLAY = "04/26";

function changePercent(pct) {
  pct = parseInt(pct, 10);
  var rects = LAYOUTS[String(pct)] || [];
  var n = rects.length;
  document.getElementById('subText').textContent =
    '單日新聞 (' + DATE_DISPLAY + ') | TOP ' + n + ' / ' + TOTAL + ' 間公司（' + pct + '%）';
  renderRects(rects);
}

function renderRects(rects) {
  var svg = document.getElementById('treemap');
  svg.innerHTML = '';
  rects.forEach(function(r) {
    var g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.style.cursor = 'pointer';

    var rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', r.x); rect.setAttribute('y', r.y);
    rect.setAttribute('width', r.w); rect.setAttribute('height', r.h);
    rect.setAttribute('fill', r.color); rect.setAttribute('rx', '4');

    var cx = (parseFloat(r.x) + parseFloat(r.w) / 2).toFixed(1);
    var cy1 = (parseFloat(r.y) + parseFloat(r.h) / 2 - 6).toFixed(1);
    var cy2 = (parseFloat(r.y) + parseFloat(r.h) / 2 + 12).toFixed(1);

    var t1 = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    t1.setAttribute('x', cx); t1.setAttribute('y', cy1);
    t1.setAttribute('text-anchor', 'middle'); t1.setAttribute('fill', r.txtColor);
    t1.setAttribute('font-size', r.fsize); t1.setAttribute('font-weight', 'bold');
    t1.setAttribute('font-family', 'Noto Sans CJK TC,Arial,sans-serif');
    t1.setAttribute('pointer-events', 'none');
    t1.textContent = r.name;

    var t2 = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    t2.setAttribute('x', cx); t2.setAttribute('y', cy2);
    t2.setAttribute('text-anchor', 'middle'); t2.setAttribute('fill', r.txtColor);
    t2.setAttribute('font-size', '13');
    t2.setAttribute('font-family', 'Noto Sans CJK TC,Arial,sans-serif');
    t2.setAttribute('pointer-events', 'none');
    t2.textContent = '(' + r.count + ')';

    g.appendChild(rect); g.appendChild(t1); g.appendChild(t2);
    svg.appendChild(g);

    g.addEventListener('click', function() {
      showNews(r.code, r.name, r.count);
    });
  });
}

function showNews(code, name, count) {
  var news = NEWS_DATA[code] || [];
  document.getElementById('modalTitle').textContent = name + ' (' + code + ')';
  document.getElementById('modalSub').textContent = '共 ' + count + ' 則新聞';
  var list = document.getElementById('newsList');
  list.innerHTML = '';
  news.forEach(function(item) {
    var d = document.createElement('div');
    d.className = 'news-item';
    var a = document.createElement('a');
    a.href = item[1]; a.target = '_blank'; a.rel = 'noopener';
    a.textContent = item[0].length > 120 ? item[0].substring(0,120) + '…' : item[0];
    var s = document.createElement('div');
    s.className = 'news-src';
    s.textContent = item[1].length > 100 ? item[1].substring(0,100) + '…' : item[1];
    d.appendChild(a); d.appendChild(s); list.appendChild(d);
  });
  document.getElementById('newsModal').style.display = 'block';
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('newsModal').style.display = 'none';
  document.body.style.overflow = '';
}

document.getElementById('newsModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

document.addEventListener('DOMContentLoaded', function() {
  renderRects(LAYOUTS['40']);
});
</script>
